<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Empire Bank | Верификация</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; width: 320px; text-align: center; }
        input { display: block; width: 100%; padding: 15px; margin: 15px 0; background: #0b0e11; border: 1px solid #30363d; border-radius: 12px; color: white; box-sizing: border-box; text-align: center; font-size: 24px; letter-spacing: 5px; }
        .btn { background: #a332ff; border: none; padding: 15px; width: 100%; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ПОДТВЕРЖДЕНИЕ</h2>
        <p style="color: #aaa; font-size: 14px;">Введите 6-значный код, отправленный на ваш телефон</p>
        <form action="{{ url_for('register.verify_code') }}" method="POST">
            <input type="text" name="sms_code" maxlength="6" placeholder="000000" required>
            <button type="submit" class="btn">ПОДТВЕРДИТЬ</button>
            {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
        </form>
    </div>
</body>
</html>
